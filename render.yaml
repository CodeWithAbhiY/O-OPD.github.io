# Render Blueprint for the O-OPD backend (Node + PostgreSQL on Neon).
# Deploy: Render Dashboard → New → Blueprint → pick this repo. Then fill the
# secret env vars (marked sync:false) in the dashboard.
services:
  - type: web
    name: o-opd-api
    runtime: node
    plan: free
    region: singapore          # closest Render region to India
    rootDir: server
    buildCommand: npm install
    # Apply schema + seed (both idempotent) on each boot, then start the API.
    startCommand: node src/db/migrate.js && node src/db/seed.js && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMTP_PORT
        value: "587"
      # Secrets — set these in the Render dashboard (never committed):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
